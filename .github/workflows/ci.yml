name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test bundled output in isolated shell
        run: |
          set -euo pipefail
          PACK_DIR="$(mktemp -d)"
          npm pack --pack-destination "$PACK_DIR"
          TARBALL=$(ls "$PACK_DIR"/redash-mcp-*.tgz | head -1)

          INSTALL_DIR="$(mktemp -d)"
          cd "$INSTALL_DIR"
          tar -xzf "$TARBALL"
          # Validate the bundled dist/index.js works without any node_modules.
          test ! -d package/node_modules
          REQ='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}'
          RESP=$(printf '%s\n' "$REQ" | REDASH_URL=http://example REDASH_API_KEY=ci-test node package/dist/index.js | head -1)
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"protocolVersion"'
